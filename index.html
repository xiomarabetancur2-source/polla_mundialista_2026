<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ Mundialito GCA 2026 - GCA Technologies</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
    }

    /* Login - Colores GCA Technologies (Azules + Plateado) */
    .login-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0d2137 0%, #1a3a5c 50%, #2c5282 100%);
    }
    .login-card {
      background: rgba(26, 58, 92, 0.95);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 16px;
      width: 350px;
      text-align: center;
      border: 1px solid rgba(192, 192, 192, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .login-card h1 {
      color: #c0c0c0;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }
    .login-card input, .login-card select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background: rgba(13, 33, 55, 0.8);
      border: 1px solid rgba(192, 192, 192, 0.3);
      border-radius: 8px;
      color: white;
    }
    .login-card input:focus, .login-card select:focus {
      outline: none;
      border-color: #c0c0c0;
    }
    .login-card button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: linear-gradient(135deg, #2c5282, #1a3a5c);
      border: 1px solid rgba(192, 192, 192, 0.5);
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: #c0c0c0;
      transition: all 0.3s;
    }
    .login-card button:hover {
      background: linear-gradient(135deg, #3a6b9e, #2c5282);
      color: white;
      border-color: #c0c0c0;
    }
    .error { color: #ff6b6b; margin-top: 10px; display: none; }

    /* App Header - Colores GCA */
    .app-header {
      background: linear-gradient(135deg, #0d2137, #1a3a5c);
      padding: 0.8rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(192, 192, 192, 0.3);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .logo {
      font-size: 1.3rem;
      font-weight: bold;
      color: #c0c0c0;
      letter-spacing: 2px;
    }
    .logo span {
      color: #4a7c9e;
    }
    .nav-buttons {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }
    .nav-btn {
      background: transparent;
      border: none;
      color: #a0a0a0;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
      font-size: 0.85rem;
    }
    .nav-btn:hover {
      background: rgba(74, 124, 158, 0.3);
      color: #c0c0c0;
    }
    .nav-btn.active {
      background: rgba(74, 124, 158, 0.5);
      color: #e0e0e0;
      border: 1px solid rgba(192, 192, 192, 0.3);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .user-badge {
      background: rgba(74, 124, 158, 0.3);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      color: #c0c0c0;
      font-size: 0.85rem;
      border: 1px solid rgba(192, 192, 192, 0.2);
    }
    .logout-btn {
      background: rgba(220, 53, 69, 0.8);
      border: none;
      padding: 0.3rem 1rem;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .logout-btn:hover {
      background: #dc3545;
    }

    /* Main Content */
    .main-content {
      padding: 1rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }

    /* Cards */
    .card {
      background: rgba(26, 58, 92, 0.6);
      backdrop-filter: blur(5px);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(192, 192, 192, 0.2);
      transition: all 0.3s;
    }
    .card:hover {
      border-color: rgba(192, 192, 192, 0.4);
      background: rgba(26, 58, 92, 0.7);
    }
    .card-title {
      color: #c0c0c0;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      font-weight: bold;
      border-bottom: 1px solid rgba(192, 192, 192, 0.2);
      padding-bottom: 0.5rem;
      letter-spacing: 1px;
    }

    /* Tablas */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid rgba(192, 192, 192, 0.1);
      font-size: 0.85rem;
    }
    th {
      color: #c0c0c0;
      font-weight: bold;
    }
    tr:hover {
      background: rgba(74, 124, 158, 0.2);
    }

    /* Grids */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 1rem;
    }
    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .nav-buttons { display: none; }
      .mobile-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(135deg, #0d2137, #1a3a5c);
        display: flex;
        padding: 0.5rem;
        border-top: 1px solid rgba(192, 192, 192, 0.3);
        z-index: 100;
      }
      .mobile-nav button {
        flex: 1;
        background: transparent;
        border: none;
        color: #a0a0a0;
        padding: 0.5rem;
        font-size: 0.7rem;
      }
      .mobile-nav button.active { color: #c0c0c0; }
      .main-content { padding-bottom: 70px; }
    }
    @media (min-width: 769px) {
      .mobile-nav { display: none; }
    }

    /* Partidos */
    .partido-item {
      background: rgba(13, 33, 55, 0.6);
      border-radius: 8px;
      padding: 0.8rem;
      margin-bottom: 0.5rem;
      border: 1px solid rgba(192, 192, 192, 0.15);
      transition: all 0.3s;
    }
    .partido-item:hover {
      border-color: rgba(192, 192, 192, 0.3);
      background: rgba(13, 33, 55, 0.8);
    }
    .partido-equipos {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .equipo-local, .equipo-visita {
      flex: 1;
      font-weight: bold;
      font-size: 0.85rem;
    }
    .equipo-local { text-align: right; }
    .vs {
      color: #c0c0c0;
      font-weight: bold;
      background: rgba(74, 124, 158, 0.3);
      padding: 2px 8px;
      border-radius: 20px;
    }
    .pred-inputs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .pred-inputs input {
      width: 55px;
      padding: 6px;
      text-align: center;
      background: rgba(13, 33, 55, 0.8);
      border: 1px solid rgba(192, 192, 192, 0.3);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
    }
    .pred-inputs input:focus {
      outline: none;
      border-color: #c0c0c0;
    }
    .pred-resultado {
      text-align: center;
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #c0c0c0;
    }
    .grupo-titulo {
      font-size: 1.1rem;
      color: #c0c0c0;
      margin: 1rem 0 0.5rem;
      padding-left: 0.5rem;
      border-left: 3px solid #4a7c9e;
    }
    .btn-borrar-pred {
      background: rgba(220, 53, 69, 0.7);
      color: white;
      border: none;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.7rem;
      margin-left: 5px;
    }
    .btn-borrar-pred:hover {
      background: #dc3545;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .stat-card {
      background: rgba(26, 58, 92, 0.6);
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(192, 192, 192, 0.2);
      transition: all 0.3s;
    }
    .stat-card:hover {
      border-color: rgba(192, 192, 192, 0.4);
      background: rgba(26, 58, 92, 0.8);
    }
    .stat-card .value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #c0c0c0;
    }

    /* Admin */
    .admin-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .admin-tab {
      background: rgba(13, 33, 55, 0.8);
      border: 1px solid rgba(192, 192, 192, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      color: #a0a0a0;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s;
    }
    .admin-tab:hover {
      background: rgba(74, 124, 158, 0.3);
      color: #c0c0c0;
    }
    .admin-tab.active {
      background: rgba(74, 124, 158, 0.5);
      color: #e0e0e0;
      border-color: rgba(192, 192, 192, 0.4);
    }
    .admin-panel {
      display: none;
    }
    .admin-panel.active {
      display: block;
    }
    .equipo-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .equipo-row input {
      padding: 6px;
      background: rgba(13, 33, 55, 0.8);
      border: 1px solid rgba(192, 192, 192, 0.3);
      border-radius: 6px;
      color: white;
    }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.3s;
    }
    .btn-primary { background: rgba(74, 124, 158, 0.8); color: white; border: 1px solid rgba(192, 192, 192, 0.3); }
    .btn-primary:hover { background: #4a7c9e; }
    .btn-danger { background: rgba(220, 53, 69, 0.8); color: white; }
    .btn-danger:hover { background: #dc3545; }
    .btn-success { background: rgba(40, 167, 69, 0.8); color: white; }
    .btn-success:hover { background: #28a745; }
    .btn-warning { background: rgba(255, 152, 0, 0.8); color: #1a1a1a; }
    .resultado-input {
      width: 50px;
      padding: 5px;
      text-align: center;
      background: rgba(13, 33, 55, 0.8);
      border: 1px solid rgba(192, 192, 192, 0.3);
      border-radius: 6px;
      color: white;
    }

    /* Adherencia */
    .adherencia-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .adh-equipo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem;
      background: rgba(13, 33, 55, 0.6);
      border-radius: 8px;
      border: 1px solid rgba(192, 192, 192, 0.15);
    }
    .adh-btns {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }
    .adh-btn {
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(13, 33, 55, 0.8);
      border: 1px solid rgba(192, 192, 192, 0.3);
      color: #a0a0a0;
      cursor: pointer;
      font-size: 0.65rem;
      transition: all 0.2s;
    }
    .adh-btn:hover {
      background: rgba(74, 124, 158, 0.4);
      color: white;
    }
    .adh-btn.selected {
      background: #4a7c9e;
      color: white;
      border-color: #c0c0c0;
    }

    /* Bono Row */
    .bono-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #28a745;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      z-index: 1000;
      animation: fadeOut 3s forwards;
    }
    .toast.error { background: #dc3545; }
    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
  </style>
</head>
<body>
  <!-- Pantalla de Login -->
  <div id="loginScreen" class="login-container">
    <div class="login-card">
      <h1>⚽ MUNDIALITO GCA 2026</h1>
      <p style="margin-bottom: 1rem; color: #a0a0a0;">GCA Technologies</p>
      <select id="loginEquipo">
        <option value="">-- Selecciona tu equipo --</option>
      </select>
      <input type="password" id="loginPin" placeholder="PIN de equipo" maxlength="4">
      <div id="loginError" class="error">❌ PIN incorrecto</div>
      <button onclick="doLogin()">INGRESAR</button>
      <button onclick="showAdminLogin()" style="background: rgba(13, 33, 55, 0.8); margin-top: 5px;">🔐 ADMINISTRADOR</button>
      <div id="connectionStatus" style="color: #888; font-size: 0.75rem; margin-top: 10px;">⏳ Conectando...</div>
    </div>
  </div>

  <!-- Pantalla Login Admin -->
  <div id="adminLoginScreen" class="login-container" style="display: none;">
    <div class="login-card">
      <h1>🔐 PANEL ADMIN</h1>
      <p style="margin-bottom: 1rem; color: #a0a0a0;">GCA Technologies</p>
      <input type="password" id="adminPass" placeholder="Contraseña de administrador">
      <div id="adminError" class="error">❌ Contraseña incorrecta</div>
      <button onclick="doAdminLogin()">INGRESAR</button>
      <button onclick="hideAdminLogin()" style="background: rgba(13, 33, 55, 0.8);">← VOLVER</button>
    </div>
  </div>

  <!-- App Principal -->
  <div id="app" style="display: none;">
    <div class="app-header">
      <div class="logo">⚽ MUNDIALITO <span>GCA 2026</span></div>
      <div class="nav-buttons">
        <button class="nav-btn active" onclick="showPage('dashboard')">📊 Dashboard</button>
        <button class="nav-btn" onclick="showPage('predicciones')">🎯 Predicciones</button>
        <button id="adminBtn" class="nav-btn" style="display: none;" onclick="showPage('admin')">⚙️ Admin</button>
      </div>
      <div class="user-info">
        <span class="user-badge" id="userBadge"></span>
        <button class="logout-btn" onclick="logout()">Salir</button>
      </div>
    </div>

    <div class="main-content">
      <!-- Dashboard -->
      <div id="pageDashboard" class="page active">
        <div class="dashboard-grid">
          <div>
            <div class="card">
              <div class="card-title">🏆 Tabla de Posiciones</div>
              <div id="rankingList"></div>
            </div>
          </div>
          <div>
            <div class="card">
              <div class="card-title">📅 Próximos Partidos</div>
              <div id="proximosPartidos"></div>
            </div>
            <div class="card">
              <div class="card-title">✅ Últimos Resultados</div>
              <div id="ultimosResultados"></div>
            </div>
          </div>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
      </div>

      <!-- Predicciones (solo para equipos normales) -->
      <div id="pagePredicciones" class="page">
        <div class="card">
          <div class="card-title">🎯 Mis Predicciones</div>
          <div style="margin-bottom: 1rem; display: flex; gap: 0.5rem; justify-content: flex-end;">
            <button class="btn btn-danger" onclick="borrarTodasMisPredicciones()">🗑️ Borrar TODAS mis predicciones</button>
          </div>
          <div id="prediccionesList"></div>
        </div>
      </div>

      <!-- Admin (solo para administrador) -->
      <div id="pageAdmin" class="page">
        <div class="admin-tabs">
          <button class="admin-tab active" onclick="showAdminTab('equipos')">👥 Equipos</button>
          <button class="admin-tab" onclick="showAdminTab('resultados')">⚽ Resultados</button>
          <button class="admin-tab" onclick="showAdminTab('adherencia')">📋 Adherencia</button>
          <button class="admin-tab" onclick="showAdminTab('bonos')">⭐ Bonos</button>
          <button class="admin-tab" onclick="showAdminTab('penalizaciones')">🚫 Penalizaciones</button>
          <button class="admin-tab" onclick="showAdminTab('prediccionesAdmin')">👁️ Ver Predicciones</button>
          <button class="admin-tab" onclick="showAdminTab('sedes')">🏟️ Sedes</button>
        </div>
        <div id="adminEquipos" class="admin-panel active"></div>
        <div id="adminResultados" class="admin-panel"></div>
        <div id="adminAdherencia" class="admin-panel"></div>
        <div id="adminBonos" class="admin-panel"></div>
        <div id="adminPenalizaciones" class="admin-panel"></div>
        <div id="adminPrediccionesAdmin" class="admin-panel"></div>
        <div id="adminSedes" class="admin-panel"></div>
      </div>
    </div>
  </div>

  <div class="mobile-nav" id="mobileNav"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Los partidos llegan del servidor via applyServerData → partidosData
    // (incluye fecha, hora, bloqueado_efectivo calculados en Colombia UTC-5)

    // ==================== ESTADO =====================
    let partidosData = [];   // array de partidos desde servidor (con fecha, hora, bloqueado_efectivo)
    let sedes = [];
    let equipos = [];
    let resultados = {};
    let predicciones = {};
    let adherencia = {};
    let bonos = [];
    let penalizaciones = [];

    const CONFIG = {
      ptsExacto: 5,
      ptsGanador: 2,
      ptsAdherencia: { todos: 5, uno: 3, dos: 1, mas: 0 },
      ptsBonos: { adherenciaSemanal: 10, calidadSemanal: 10, productividadSemanal: 10, asistencia: 5 },
      ptsPenalizaciones: { conducta: -5, inasistencia: -10, convivencia: -10 }
    };

    let currentUser = null;
    let currentPage = 'dashboard';
    let currentAdminTab = 'equipos';

    // ==================== API + SOCKET.IO ====================
    async function apiCall(method, url, body) {
      try {
        const opts = { method, headers: {} };
        if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
        const res = await fetch(url, opts);
        return await res.json();
      } catch (e) {
        mostrarToast('❌ Error de conexión', 'error');
        return { error: 'Error de conexión' };
      }
    }

    function applyServerData(data) {
      sedes = (data.sedes || []).map(s => ({ ...s, activo: Boolean(s.activo) }));
      equipos = data.equipos.map(e => ({ ...e, activo: Boolean(e.activo) }));
      partidosData = data.partidos || [];

      resultados = {};
      for (const r of data.resultados) resultados[r.partido_id] = { local: r.local, visita: r.visita };

      predicciones = {};
      for (const p of data.predicciones) {
        if (!predicciones[p.equipo_id]) predicciones[p.equipo_id] = {};
        predicciones[p.equipo_id][p.partido_id] = { local: p.local, visita: p.visita };
      }

      adherencia = {};
      for (const a of data.adherencia) {
        if (!adherencia[a.equipo_id]) adherencia[a.equipo_id] = {};
        adherencia[a.equipo_id][a.fecha] = a.puntos;
      }

      bonos = data.bonos.map(b => ({ id: b.id, equipoId: b.equipo_id, puntos: b.puntos, descripcion: b.descripcion, fecha: b.fecha }));
      penalizaciones = data.penalizaciones.map(p => ({ id: p.id, equipoId: p.equipo_id, puntos: p.puntos, descripcion: p.descripcion, fecha: p.fecha }));
    }

    function renderCurrentPage() {
      if (!currentUser) return;
      if (document.getElementById('pageDashboard').classList.contains('active')) renderDashboard();
      if (document.getElementById('pagePredicciones').classList.contains('active')) renderPredicciones();
      if (document.getElementById('pageAdmin').classList.contains('active') && currentUser.isAdmin) {
        if (currentAdminTab === 'equipos') renderAdminEquipos();
        else if (currentAdminTab === 'resultados') renderAdminResultados();
        else if (currentAdminTab === 'adherencia') renderAdminAdherencia();
        else if (currentAdminTab === 'bonos') renderAdminBonos();
        else if (currentAdminTab === 'penalizaciones') renderAdminPenalizaciones();
        else if (currentAdminTab === 'prediccionesAdmin') renderAdminPredicciones();
        else if (currentAdminTab === 'sedes') renderAdminSedes();
      }
    }

    const socket = io();

    socket.on('connect', () => {
      const el = document.getElementById('connectionStatus');
      if (el) el.textContent = '🟢 En línea';
    });

    socket.on('disconnect', () => {
      const el = document.getElementById('connectionStatus');
      if (el) el.textContent = '🔴 Sin conexión — reconectando...';
    });

    socket.on('data-update', (data) => {
      applyServerData(data);
      cargarEquiposLogin();
      renderCurrentPage();
    });

    // ==================== CÁLCULO DE PUNTOS ====================
    function calcularPuntosPrediccion(predLocal, predVisit, resLocal, resVisit) {
      if (resLocal === undefined || resVisit === undefined) return null;
      if (predLocal === resLocal && predVisit === resVisit) return CONFIG.ptsExacto;
      const predGanador = predLocal > predVisit ? 'L' : (predLocal < predVisit ? 'V' : 'E');
      const resGanador = resLocal > resVisit ? 'L' : (resLocal < resVisit ? 'V' : 'E');
      if (predGanador === resGanador) return CONFIG.ptsGanador;
      return 0;
    }

    function calcularTotalPuntos() {
      const ranking = [];
      for (const equipo of equipos) {
        if (!equipo.activo) continue;
        let puntosPrediccion = 0;
        let exactos = 0;
        const predsEquipo = predicciones[equipo.id] || {};
        for (const partido of partidosData) {
          const resultado = resultados[partido.id];
          const prediccion = predsEquipo[partido.id];
          if (resultado && prediccion && prediccion.local !== undefined && prediccion.visita !== undefined) {
            const pts = calcularPuntosPrediccion(prediccion.local, prediccion.visita, resultado.local, resultado.visita);
            if (pts !== null) { puntosPrediccion += pts; if (pts === CONFIG.ptsExacto) exactos++; }
          }
        }
        let puntosAdherencia = 0;
        const adhEquipo = adherencia[equipo.id] || {};
        for (const fecha in adhEquipo) puntosAdherencia += adhEquipo[fecha];
        let puntosBonos = 0;
        for (const bono of bonos) if (bono.equipoId === equipo.id) puntosBonos += bono.puntos;
        let puntosPenalizaciones = 0;
        for (const penal of penalizaciones) if (penal.equipoId === equipo.id) puntosPenalizaciones += penal.puntos;
        const total = puntosPrediccion + puntosAdherencia + puntosBonos + puntosPenalizaciones;
        ranking.push({ id: equipo.id, nombre: equipo.nombre, puntosPrediccion, puntosAdherencia, puntosBonos, puntosPenalizaciones, total, exactos, totalPredicciones: Object.keys(predsEquipo).length });
      }
      ranking.sort((a, b) => b.total - a.total || b.exactos - a.exactos || b.puntosAdherencia - a.puntosAdherencia);
      return ranking;
    }

          ${sedes.map(s => `
            <div class="equipo-row">
              <input type="text" id="sedeNombre_${s.id}" value="${s.nombre}" style="width:200px" placeholder="Nombre">
              <input type="text" id="sedeSlug_${s.id}" value="${s.slug}" style="width:130px" placeholder="slug-identificador">
              <span style="color: ${s.activo ? '#6c9ebf' : '#ff6b6b'}">${s.activo ? '✅ Activa' : '❌ Inactiva'}</span>
              <button class="btn btn-primary" onclick="guardarSede(${s.id})">💾</button>
              <button class="btn ${s.activo ? 'btn-danger' : 'btn-success'}" onclick="toggleSede(${s.id})">${s.activo ? '❌' : '✅'}</button>
            </div>
          `).join('')}
          <hr style="margin: 1rem 0; border-color: rgba(192,192,192,0.2)">
          <div class="equipo-row">
            <input type="text" id="nuevaSedeNombre" placeholder="Nombre nueva sede" style="width:200px">
            <input type="text" id="nuevaSedeSlug" placeholder="slug-nueva" style="width:130px">
            <button class="btn btn-primary" onclick="agregarSede()">+ Agregar Sede</button>
          </div>
        </div>
      `;
    }

    async function guardarSede(id) {
      const nombre = document.getElementById(`sedeNombre_${id}`).value;
      const slug = document.getElementById(`sedeSlug_${id}`).value;
      await apiCall('PUT', `/api/sedes/${id}`, { nombre, slug });
      mostrarToast('✅ Sede actualizada');
    }

    async function toggleSede(id) {
      await apiCall('PUT', `/api/sedes/${id}/toggle`);
      mostrarToast('🏟️ Estado de sede actualizado');
    }

    async function agregarSede() {
      const nombre = document.getElementById('nuevaSedeNombre').value;
      const slug = document.getElementById('nuevaSedeSlug').value;
      if (!nombre || !slug) { mostrarToast('❌ Ingresa nombre y slug', 'error'); return; }
      await apiCall('POST', '/api/sedes', { nombre, slug });
      mostrarToast('➕ Sede agregada');
    }

    async function borrarPrediccionesEquipo(equipoId) {
      const eq = equipos.find(e => e.id === equipoId);
      if (confirm(`⚠️ ¿Estás seguro? Esto borrará TODAS las predicciones de ${eq?.nombre}.`)) {
        await apiCall('DELETE', `/api/predicciones/${equipoId}`);
        mostrarToast(`🗑️ Predicciones de ${eq?.nombre} eliminadas`);
      }
    }

    // ==================== NAVEGACIÓN ====================
    function showPage(page) {
      currentPage = page;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page${page.charAt(0).toUpperCase() + page.slice(1)}`).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      if (page === 'dashboard') renderDashboard();
      if (page === 'predicciones') renderPredicciones();
      if (page === 'admin' && currentUser?.isAdmin) showAdminTab(currentAdminTab);
    }

    function showAdminTab(tab) {
      currentAdminTab = tab;
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
      const tabEls = {
        equipos:          ['adminEquipos',           renderAdminEquipos],
        resultados:       ['adminResultados',         renderAdminResultados],
        adherencia:       ['adminAdherencia',         renderAdminAdherencia],
        bonos:            ['adminBonos',              renderAdminBonos],
        penalizaciones:   ['adminPenalizaciones',     renderAdminPenalizaciones],
        prediccionesAdmin:['adminPrediccionesAdmin',  renderAdminPredicciones],
        sedes:            ['adminSedes',              renderAdminSedes]
      };
      if (tabEls[tab]) {
        document.querySelector(`.admin-tab[onclick*="${tab}"]`).classList.add('active');
        document.getElementById(tabEls[tab][0]).classList.add('active');
        tabEls[tab][1]();
      }
    }

    // ==================== AUTENTICACIÓN ====================
    async function doLogin() {
      const equipoId = parseInt(document.getElementById('loginEquipo').value);
      const pin = document.getElementById('loginPin').value;
      if (!equipoId) { document.getElementById('loginError').style.display = 'block'; return; }
      const res = await apiCall('POST', '/api/auth/equipo', { equipoId, pin });
      if (res.error || !res.equipo) { document.getElementById('loginError').style.display = 'block'; return; }
      document.getElementById('loginError').style.display = 'none';
      const equipo = res.equipo;
      currentUser = { id: equipo.id, nombre: equipo.nombre, isAdmin: false };
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('userBadge').textContent = `🟢 ${equipo.nombre}`;
      showPage('dashboard');
      actualizarMobileNav();
    }

    async function doAdminLogin() {
      const pass = document.getElementById('adminPass').value;
      const res = await apiCall('POST', '/api/auth/admin', { password: pass });
      if (res.error) { document.getElementById('adminError').style.display = 'block'; return; }
      document.getElementById('adminError').style.display = 'none';
      currentUser = { id: 0, nombre: 'Admin', isAdmin: true };
      document.getElementById('adminLoginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('userBadge').textContent = '⚙️ Admin';
      document.getElementById('adminBtn').style.display = 'block';
      showPage('dashboard');
      actualizarMobileNav();
    }

    function logout() {
      currentUser = null;
      document.getElementById('app').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginPin').value = '';
      document.getElementById('adminBtn').style.display = 'none';
    }

    function showAdminLogin() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminLoginScreen').style.display = 'flex';
    }

    function hideAdminLogin() {
      document.getElementById('adminLoginScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    }

    function actualizarMobileNav() {
      const mobileNav = document.getElementById('mobileNav');
      const pages = ['dashboard', 'predicciones'];
      if (currentUser?.isAdmin) pages.push('admin');
      mobileNav.innerHTML = pages.map(p => `
        <button onclick="showPage('${p}')" class="${currentPage === p ? 'active' : ''}">
          ${p === 'dashboard' ? '📊' : p === 'predicciones' ? '🎯' : '⚙️'}
          <br><span style="font-size:0.6rem">${p}</span>
        </button>
      `).join('');
    }

    function cargarEquiposLogin() {
      const select = document.getElementById('loginEquipo');
      if (!select) return;
      select.innerHTML = '<option value="">-- Selecciona tu equipo --</option>' +
        equipos.filter(e => e.activo).map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
    }

    function mostrarToast(mensaje, tipo = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${tipo === 'error' ? 'error' : ''}`;
      toast.textContent = mensaje;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ==================== EXPORTAR FUNCIONES GLOBALES ====================
    window.guardarPrediccion = guardarPrediccion;
    window.borrarPrediccion = borrarPrediccion;
    window.borrarTodasMisPredicciones = borrarTodasMisPredicciones;
    window.guardarResultado = guardarResultado;
    window.borrarResultado = borrarResultado;
    window.borrarTodosResultados = borrarTodosResultados;
    window.guardarEquipo = guardarEquipo;
    window.toggleEquipo = toggleEquipo;
    window.agregarEquipo = agregarEquipo;
    window.setAdherencia = setAdherencia;
    window.cargarAdherenciaFecha = cargarAdherenciaFecha;
    window.agregarBono = agregarBono;
    window.eliminarBono = eliminarBono;
    window.toggleBonoPersonalizado = toggleBonoPersonalizado;
    window.agregarPenalizacion = agregarPenalizacion;
    window.eliminarPenalizacion = eliminarPenalizacion;
    window.togglePenPersonalizado = togglePenPersonalizado;
    window.borrarPrediccionesEquipo = borrarPrediccionesEquipo;
    window.toggleBloqueo = toggleBloqueo;
    window.guardarSede = guardarSede;
    window.toggleSede = toggleSede;
    window.agregarSede = agregarSede;
    window.showPage = showPage;
    window.showAdminTab = showAdminTab;
    window.doLogin = doLogin;
    window.doAdminLogin = doAdminLogin;
    window.showAdminLogin = showAdminLogin;
    window.hideAdminLogin = hideAdminLogin;
    window.logout = logout;
  </script>
</body>
</html>
