<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ Mundialito GCA 2026 - GCA Technologies</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
    }

    /* Login - Colores GCA Technologies (Azules + Plateado) */
    .login-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0d2137 0%, #1a3a5c 50%, #2c5282 100%);
    }
    .login-card {
      background: rgba(26, 58, 92, 0.95);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 16px;
      width: 350px;
      text-align: center;
      border: 1px solid rgba(192, 192, 192, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .login-card h1 {
      color: #c0c0c0;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }
    .login-card input, .login-card select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background: rgba(13, 33, 55, 0.8);
      border: 1px solid rgba(192, 192, 192, 0.3);
      border-radius: 8px;
      color: white;
    }
    .login-card input:focus, .login-card select:focus {
      outline: none;
      border-color: #c0c0c0;
    }
    .login-card button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: linear-gradient(135deg, #2c5282, #1a3a5c);
      border: 1px solid rgba(192, 192, 192, 0.5);
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: #c0c0c0;
      transition: all 0.3s;
    }
    .login-card button:hover {
      background: linear-gradient(135deg, #3a6b9e, #2c5282);
      color: white;
      border-color: #c0c0c0;
    }
    .error { color: #ff6b6b; margin-top: 10px; display: none; }

    /* Bracket / Fixture */
    .bracket-wrapper { overflow-x: auto; padding: 1rem 0; }
    .bracket { display: flex; align-items: stretch; min-width: 1100px; gap: 0; }
    .bracket-round { display: flex; flex-direction: column; justify-content: space-around; flex: 1; min-width: 110px; padding: 0 2px; }
    .bracket-round-title { text-align: center; font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: bold; }
    .bm { background: rgba(13,33,55,0.7); border: 1px solid rgba(192,192,192,0.2); border-radius: 6px; margin: 3px 0; overflow: hidden; font-size: 0.72rem; }
    .bm.played { border-color: rgba(108,158,191,0.5); }
    .bm-team { display: flex; align-items: center; gap: 4px; padding: 4px 6px; border-bottom: 1px solid rgba(192,192,192,0.1); }
    .bm-team:last-child { border-bottom: none; }
    .bm-team.winner { background: rgba(108,158,191,0.15); color: #c0c0c0; font-weight: bold; }
    .bm-flag { flex-shrink: 0; line-height: 1; }
    .bm-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #c0c0c0; }
    .bm-score { font-weight: bold; color: #6c9ebf; min-width: 14px; text-align: center; }
    .bm-tbd .bm-name { color: #666; font-style: italic; }
    .bracket-final-label { text-align: center; font-size: 1.1rem; color: #c0c0c0; font-weight: bold; margin-bottom: 8px; }
    @media (max-width: 900px) {
      .bracket { flex-direction: column; min-width: unset; gap: 1rem; }
      .bracket-round { min-width: unset; }
    }

    /* Secciones colapsables Admin */
    details.admin-section { margin-bottom: 1rem; }
    details.admin-section > summary {
      cursor: pointer; padding: 10px 14px; background: rgba(13,33,55,0.6);
      border: 1px solid rgba(192,192,192,0.2); border-radius: 8px;
      color: #c0c0c0; font-weight: bold; font-size: 0.9rem; list-style: none;
      display: flex; align-items: center; gap: 8px;
    }
    details.admin-section > summary::-webkit-details-marker { display: none; }
    details.admin-section > summary::before { content: '▶'; font-size: 0.7rem; transition: transform 0.2s; }
    details.admin-section[open] > summary::before { transform: rotate(90deg); }
    details.admin-section[open] > summary { border-radius: 8px 8px 0 0; margin-bottom: 0; }
    details.admin-section > .admin-section-content { padding: 0.5rem 0; }

    /* App Header - Colores GCA */
    .app-header {
      background: linear-gradient(135deg, #0d2137, #1a3a5c);
      padding: 0.8rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(192, 192, 192, 0.3);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .logo {
      font-size: 1.3rem;
      font-weight: bold;
      color: #c0c0c0;
      letter-spacing: 2px;
    }
    .logo span {
      color: #4a7c9e;
    }
    .nav-buttons {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }
    .nav-btn {
      background: transparent;
      border: none;
      color: #a0a0a0;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
      font-size: 0.85rem;
    }
    .nav-btn:hover {
      background: rgba(74, 124, 158, 0.3);
      color: #c0c0c0;
    }
    .nav-btn.active {
      background: rgba(74, 124, 158, 0.5);
      color: #e0e0e0;
      border: 1px solid rgba(192, 192, 192, 0.3);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .user-badge {
      background: rgba(74, 124, 158, 0.3);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      color: #c0c0c0;
      font-size: 0.85rem;
      border: 1px solid rgba(192, 192, 192, 0.2);
    }
    .logout-btn {
      background: rgba(220, 53, 69, 0.8);
      border: none;
      padding: 0.3rem 1rem;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .logout-btn:hover {
      background: #dc3545;
    }

    /* Main Content */
    .main-content {
      padding: 1rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }

    /* Cards */
    .card {
      background: rgba(26, 58, 92, 0.6);
      backdrop-filter: blur(5px);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(192, 192, 192, 0.2);
      transition: all 0.3s;
    }
    .card:hover {
      border-color: rgba(192, 192, 192, 0.4);
      background: rgba(26, 58, 92, 0.7);
    }
    .card-title {
      color: #c0c0c0;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      font-weight: bold;
      border-bottom: 1px solid rgba(192, 192, 192, 0.2);
      padding-bottom: 0.5rem;
      letter-spacing: 1px;
    }

    /* Tablas */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid rgba(192, 192, 192, 0.1);
      font-size: 0.85rem;
    }
    th {
      color: #c0c0c0;
      font-weight: bold;
    }
    tr:hover {
      background: rgba(74, 124, 158, 0.2);
    }

    /* Grids */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 1rem;
    }
    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .nav-buttons { display: none; }
      .mobile-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(135deg, #0d2137, #1a3a5c);
        display: flex;
        padding: 0.5rem;
        border-top: 1px solid rgba(192, 192, 192, 0.3);
        z-index: 100;
      }
      .mobile-nav button {
        flex: 1;
        background: transparent;
        border: none;
        color: #a0a0a0;
        padding: 0.5rem;
        font-size: 0.7rem;
      }
      .mobile-nav button.active { color: #c0c0c0; }
      .main-content { padding-bottom: 70px; }
    }
    @media (min-width: 769px) {
      .mobile-nav { display: none; }
    }

    /* Partidos */
    .partido-item {
      background: rgba(13, 33, 55, 0.6);
      border-radius: 8px;
      padding: 0.8rem;
      margin-bottom: 0.5rem;
      border: 1px solid rgba(192, 192, 192, 0.15);
      transition: all 0.3s;
    }
    .partido-item:hover {
      border-color: rgba(192, 192, 192, 0.3);
      background: rgba(13, 33, 55, 0.8);
    }
    .partido-equipos {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .equipo-local, .equipo-visita {
      flex: 1;
      font-weight: bold;
      font-size: 0.85rem;
    }
    .equipo-local { text-align: right; }
    .vs {
      color: #c0c0c0;
      font-weight: bold;
      background: rgba(74, 124, 158, 0.3);
      padding: 2px 8px;
      border-radius: 20px;
    }
    .pred-inputs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .pred-inputs input {
      width: 55px;
      padding: 6px;
      text-align: center;
      background: rgba(13, 33, 55, 0.8);
      border: 1px solid rgba(192, 192, 192, 0.3);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
    }
    .pred-inputs input:focus {
      outline: none;
      border-color: #c0c0c0;
    }
    .pred-resultado {
      text-align: center;
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #c0c0c0;
    }
    .grupo-titulo {
      font-size: 1.1rem;
      color: #c0c0c0;
      margin: 1rem 0 0.5rem;
      padding-left: 0.5rem;
      border-left: 3px solid #4a7c9e;
    }
    .btn-borrar-pred {
      background: rgba(220, 53, 69, 0.7);
      color: white;
      border: none;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.7rem;
      margin-left: 5px;
    }
    .btn-borrar-pred:hover {
      background: #dc3545;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .stat-card {
      background: rgba(26, 58, 92, 0.6);
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(192, 192, 192, 0.2);
      transition: all 0.3s;
    }
    .stat-card:hover {
      border-color: rgba(192, 192, 192, 0.4);
      background: rgba(26, 58, 92, 0.8);
    }
    .stat-card .value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #c0c0c0;
    }

    /* Admin */
    .admin-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .admin-tab {
      background: rgba(13, 33, 55, 0.8);
      border: 1px solid rgba(192, 192, 192, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      color: #a0a0a0;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s;
    }
    .admin-tab:hover {
      background: rgba(74, 124, 158, 0.3);
      color: #c0c0c0;
    }
    .admin-tab.active {
      background: rgba(74, 124, 158, 0.5);
      color: #e0e0e0;
      border-color: rgba(192, 192, 192, 0.4);
    }
    .admin-panel {
      display: none;
    }
    .admin-panel.active {
      display: block;
    }
    .equipo-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .equipo-row input {
      padding: 6px;
      background: rgba(13, 33, 55, 0.8);
      border: 1px solid rgba(192, 192, 192, 0.3);
      border-radius: 6px;
      color: white;
    }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.3s;
    }
    .btn-primary { background: rgba(74, 124, 158, 0.8); color: white; border: 1px solid rgba(192, 192, 192, 0.3); }
    .btn-primary:hover { background: #4a7c9e; }
    .btn-danger { background: rgba(220, 53, 69, 0.8); color: white; }
    .btn-danger:hover { background: #dc3545; }
    .btn-success { background: rgba(40, 167, 69, 0.8); color: white; }
    .btn-success:hover { background: #28a745; }
    .btn-warning { background: rgba(255, 152, 0, 0.8); color: #1a1a1a; }
    .resultado-input {
      width: 50px;
      padding: 5px;
      text-align: center;
      background: rgba(13, 33, 55, 0.8);
      border: 1px solid rgba(192, 192, 192, 0.3);
      border-radius: 6px;
      color: white;
    }

    /* Adherencia */
    .adherencia-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .adh-equipo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem;
      background: rgba(13, 33, 55, 0.6);
      border-radius: 8px;
      border: 1px solid rgba(192, 192, 192, 0.15);
    }
    .adh-btns {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }
    .adh-btn {
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(13, 33, 55, 0.8);
      border: 1px solid rgba(192, 192, 192, 0.3);
      color: #a0a0a0;
      cursor: pointer;
      font-size: 0.65rem;
      transition: all 0.2s;
    }
    .adh-btn:hover {
      background: rgba(74, 124, 158, 0.4);
      color: white;
    }
    .adh-btn.selected {
      background: #4a7c9e;
      color: white;
      border-color: #c0c0c0;
    }

    /* Bono Row */
    .bono-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #28a745;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      z-index: 1000;
      animation: fadeOut 3s forwards;
    }
    .toast.error { background: #dc3545; }
    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
  </style>
</head>
<body>
  <!-- Pantalla de Login -->
  <div id="loginScreen" class="login-container">
    <div class="login-card">
      <h1>⚽ MUNDIALITO GCA 2026</h1>
      <p style="margin-bottom: 1rem; color: #a0a0a0;">GCA Technologies</p>
      <select id="loginSede" onchange="filtrarEquiposPorSede()">
        <option value="">-- Selecciona tu sede --</option>
      </select>
      <select id="loginEquipo">
        <option value="">-- Selecciona tu equipo --</option>
      </select>
      <input type="password" id="loginPin" placeholder="PIN de equipo" maxlength="4">
      <div id="loginError" class="error">❌ Sede, equipo o PIN incorrecto</div>
      <button onclick="doLogin()">INGRESAR</button>
      <button onclick="showAdminLogin()" style="background: rgba(13, 33, 55, 0.8); margin-top: 5px;">🔐 ADMINISTRADOR</button>
      <div id="connectionStatus" style="color: #888; font-size: 0.75rem; margin-top: 10px;">⏳ Conectando...</div>
    </div>
  </div>

  <!-- Pantalla Login Admin -->
  <div id="adminLoginScreen" class="login-container" style="display: none;">
    <div class="login-card">
      <h1>🔐 PANEL ADMIN</h1>
      <p style="margin-bottom: 1rem; color: #a0a0a0;">GCA Technologies</p>
      <input type="password" id="adminPass" placeholder="Contraseña de administrador">
      <div id="adminError" class="error">❌ Contraseña incorrecta</div>
      <button onclick="doAdminLogin()">INGRESAR</button>
      <button onclick="hideAdminLogin()" style="background: rgba(13, 33, 55, 0.8);">← VOLVER</button>
    </div>
  </div>

  <!-- App Principal -->
  <div id="app" style="display: none;">
    <div class="app-header">
      <div class="logo">⚽ MUNDIALITO <span>GCA 2026</span></div>
      <div class="nav-buttons">
        <button class="nav-btn active" onclick="showPage('dashboard')">📊 Dashboard</button>
        <button class="nav-btn" onclick="showPage('predicciones')">🎯 Predicciones</button>
        <button class="nav-btn" onclick="showPage('fixture')">🏆 Fixture</button>
        <button id="adminBtn" class="nav-btn" style="display: none;" onclick="showPage('admin')">⚙️ Admin</button>
      </div>
      <div class="user-info">
        <span class="user-badge" id="userBadge"></span>
        <button class="logout-btn" onclick="logout()">Salir</button>
      </div>
    </div>

    <div class="main-content">
      <!-- Dashboard -->
      <div id="pageDashboard" class="page active">
        <div class="dashboard-grid">
          <div>
            <div class="card">
              <div class="card-title">🏆 Tabla de Posiciones</div>
              <div id="rankingList"></div>
            </div>
          </div>
          <div>
            <div class="card">
              <div class="card-title">📅 Próximos Partidos</div>
              <div id="proximosPartidos"></div>
            </div>
            <div class="card">
              <div class="card-title">✅ Últimos Resultados</div>
              <div id="ultimosResultados"></div>
            </div>
          </div>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
      </div>

      <!-- Predicciones (solo para equipos normales) -->
      <div id="pagePredicciones" class="page">
        <div class="card">
          <div class="card-title">🎯 Mis Predicciones</div>
          <div style="margin-bottom: 1rem; display: flex; gap: 0.5rem; justify-content: flex-end;">
            <button class="btn btn-danger" onclick="borrarTodasMisPredicciones()">🗑️ Borrar TODAS mis predicciones</button>
          </div>
          <div id="prediccionesList"></div>
        </div>
      </div>

      <!-- Fixture / Bracket -->
      <div id="pageFixture" class="page">
        <div class="card">
          <div class="card-title">🏆 Fixture — Eliminación Directa</div>
          <div id="fixtureContent"></div>
        </div>
      </div>

      <!-- Admin (solo para administrador) -->
      <div id="pageAdmin" class="page">
        <div class="admin-tabs">
          <button class="admin-tab active" onclick="showAdminTab('equipos')">👥 Equipos</button>
          <button class="admin-tab" onclick="showAdminTab('resultados')">⚽ Resultados</button>
          <button class="admin-tab" onclick="showAdminTab('adherencia')">📋 Adherencia</button>
          <button class="admin-tab" onclick="showAdminTab('bonos')">⭐ Bonos</button>
          <button class="admin-tab" onclick="showAdminTab('penalizaciones')">🚫 Penalizaciones</button>
          <button class="admin-tab" onclick="showAdminTab('prediccionesAdmin')">👁️ Ver Predicciones</button>
          <button class="admin-tab" onclick="showAdminTab('sedes')">🏟️ Sedes</button>
        </div>
        <div id="adminEquipos" class="admin-panel active"></div>
        <div id="adminResultados" class="admin-panel"></div>
        <div id="adminAdherencia" class="admin-panel"></div>
        <div id="adminBonos" class="admin-panel"></div>
        <div id="adminPenalizaciones" class="admin-panel"></div>
        <div id="adminPrediccionesAdmin" class="admin-panel"></div>
        <div id="adminSedes" class="admin-panel"></div>
      </div>
    </div>
  </div>

  <div class="mobile-nav" id="mobileNav"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ==================== BANDERAS ====================
    const BANDERAS = {
      'México':'mx','Sudáfrica':'za','Corea del Sur':'kr','República Checa':'cz',
      'Canadá':'ca','Bosnia':'ba','Catar':'qa','Suiza':'ch',
      'Brasil':'br','Marruecos':'ma','Haití':'ht','Escocia':'gb-sct',
      'Estados Unidos':'us','Paraguay':'py','Australia':'au','Turquía':'tr',
      'Alemania':'de','Curazao':'cw','Costa de Marfil':'ci','Ecuador':'ec',
      'Países Bajos':'nl','Japón':'jp','Suecia':'se','Túnez':'tn',
      'Bélgica':'be','Egipto':'eg','Irán':'ir','Nueva Zelanda':'nz',
      'España':'es','Cabo Verde':'cv','Arabia Saudita':'sa','Uruguay':'uy',
      'Francia':'fr','Senegal':'sn','Irak':'iq','Noruega':'no',
      'Argentina':'ar','Argelia':'dz','Austria':'at','Jordania':'jo',
      'Portugal':'pt','República Democrática del Congo':'cd',
      'Inglaterra':'gb-eng','Croacia':'hr',
      'Ghana':'gh','Panamá':'pa','Uzbekistán':'uz','Colombia':'co'
    };
    function bandera(nombre) {
      const code = BANDERAS[nombre];
      if (!code) return '';
      return `<span class="fi fi-${code}" style="font-size:1.1em;vertical-align:middle"></span>`;
    }

    // ==================== ESTADO =====================
    let partidosData = [];   // array de partidos desde servidor (con fecha, hora, bloqueado_efectivo)
    let sedes = [];
    let equipos = [];
    let resultados = {};
    let predicciones = {};
    let adherencia = {};
    let bonos = [];
    let penalizaciones = [];

    const CONFIG = {
      ptsExacto: 5,
      ptsGanador: 2,
      ptsAdherencia: { todos: 5, uno: 3, dos: 1, mas: 0 },
      ptsBonos: { adherenciaSemanal: 10, calidadSemanal: 10, productividadSemanal: 10, asistencia: 5 },
      ptsPenalizaciones: { conducta: -5, inasistencia: -10, convivencia: -10 }
    };

    let currentUser = null;
    let currentPage = 'dashboard';
    let currentAdminTab = 'equipos';

    // ==================== API + SOCKET.IO ====================
    async function apiCall(method, url, body) {
      try {
        const opts = { method, headers: {} };
        if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
        const res = await fetch(url, opts);
        return await res.json();
      } catch (e) {
        mostrarToast('❌ Error de conexión', 'error');
        return { error: 'Error de conexión' };
      }
    }

    function applyServerData(data) {
      sedes = (data.sedes || []).map(s => ({ ...s, activo: Boolean(s.activo) }));
      equipos = data.equipos.map(e => ({ ...e, activo: Boolean(e.activo) }));
      partidosData = data.partidos || [];

      resultados = {};
      for (const r of data.resultados) resultados[r.partido_id] = { local: r.local, visita: r.visita };

      predicciones = {};
      for (const p of data.predicciones) {
        if (!predicciones[p.equipo_id]) predicciones[p.equipo_id] = {};
        predicciones[p.equipo_id][p.partido_id] = { local: p.local, visita: p.visita };
      }

      adherencia = {};
      for (const a of data.adherencia) {
        if (!adherencia[a.equipo_id]) adherencia[a.equipo_id] = {};
        adherencia[a.equipo_id][a.fecha] = a.puntos;
      }

      bonos = data.bonos.map(b => ({ id: b.id, equipoId: b.equipo_id, puntos: b.puntos, descripcion: b.descripcion, fecha: b.fecha }));
      penalizaciones = data.penalizaciones.map(p => ({ id: p.id, equipoId: p.equipo_id, puntos: p.puntos, descripcion: p.descripcion, fecha: p.fecha }));
    }

    function renderCurrentPage() {
      if (!currentUser) return;
      if (document.getElementById('pageDashboard').classList.contains('active')) renderDashboard();
      if (document.getElementById('pagePredicciones').classList.contains('active')) renderPredicciones();
      if (document.getElementById('pageFixture').classList.contains('active')) renderFixture();
      if (document.getElementById('pageAdmin').classList.contains('active') && currentUser.isAdmin) {
        if (currentAdminTab === 'equipos') renderAdminEquipos();
        else if (currentAdminTab === 'resultados') renderAdminResultados();
        else if (currentAdminTab === 'adherencia') renderAdminAdherencia();
        else if (currentAdminTab === 'bonos') renderAdminBonos();
        else if (currentAdminTab === 'penalizaciones') renderAdminPenalizaciones();
        else if (currentAdminTab === 'prediccionesAdmin') renderAdminPredicciones();
        else if (currentAdminTab === 'sedes') renderAdminSedes();
      }
    }

    const socket = io();

    socket.on('connect', () => {
      const el = document.getElementById('connectionStatus');
      if (el) el.textContent = '🟢 En línea';
    });

    socket.on('disconnect', () => {
      const el = document.getElementById('connectionStatus');
      if (el) el.textContent = '🔴 Sin conexión — reconectando...';
    });

    socket.on('data-update', (data) => {
      applyServerData(data);
      cargarSedesLogin();
      renderCurrentPage();
    });

    // ==================== CÁLCULO DE PUNTOS ====================
    function calcularPuntosPrediccion(predLocal, predVisit, resLocal, resVisit) {
      if (resLocal === undefined || resVisit === undefined) return null;
      if (predLocal === resLocal && predVisit === resVisit) return CONFIG.ptsExacto;
      const predGanador = predLocal > predVisit ? 'L' : (predLocal < predVisit ? 'V' : 'E');
      const resGanador = resLocal > resVisit ? 'L' : (resLocal < resVisit ? 'V' : 'E');
      if (predGanador === resGanador) return CONFIG.ptsGanador;
      return 0;
    }

    function calcularTotalPuntos() {
      const ranking = [];
      const misPartidos = getPartidosDeSede();
      for (const equipo of getEquiposDeSede()) {
        if (!equipo.activo) continue;
        let puntosPrediccion = 0;
        let exactos = 0;
        const predsEquipo = predicciones[equipo.id] || {};
        for (const partido of misPartidos) {
          const resultado = resultados[partido.id];
          const prediccion = predsEquipo[partido.id];
          if (resultado && prediccion && prediccion.local !== undefined && prediccion.visita !== undefined) {
            const pts = calcularPuntosPrediccion(prediccion.local, prediccion.visita, resultado.local, resultado.visita);
            if (pts !== null) { puntosPrediccion += pts; if (pts === CONFIG.ptsExacto) exactos++; }
          }
        }
        let puntosAdherencia = 0;
        const adhEquipo = adherencia[equipo.id] || {};
        for (const fecha in adhEquipo) puntosAdherencia += adhEquipo[fecha];
        let puntosBonos = 0;
        for (const bono of bonos) if (bono.equipoId === equipo.id) puntosBonos += bono.puntos;
        let puntosPenalizaciones = 0;
        for (const penal of penalizaciones) if (penal.equipoId === equipo.id) puntosPenalizaciones += penal.puntos;
        const total = puntosPrediccion + puntosAdherencia + puntosBonos + puntosPenalizaciones;
        ranking.push({ id: equipo.id, nombre: equipo.nombre, puntosPrediccion, puntosAdherencia, puntosBonos, puntosPenalizaciones, total, exactos, totalPredicciones: Object.keys(predsEquipo).length });
      }
      ranking.sort((a, b) => b.total - a.total || b.exactos - a.exactos || b.puntosAdherencia - a.puntosAdherencia);
      return ranking;
    }

    // ==================== RENDERIZADO DASHBOARD ====================
    function renderDashboard() {
      const ranking = calcularTotalPuntos();
      document.getElementById('rankingList').innerHTML = `
        <table>
          <thead><tr><th>#</th><th>Equipo</th><th>Total</th><th>Pred</th><th>Adh</th><th>Bonus</th><th>Pen</th><th>🎯</th></tr></thead>
          <tbody>
            ${ranking.map((eq, i) => `
              <tr>
                <td><strong>${i+1}</strong> ${i===0?'🏆':''}${i===1?'🥈':''}${i===2?'🥉':''}</td>
                <td>${eq.nombre}</td>
                <td style="color:#c0c0c0; font-weight:bold">${eq.total}</td>
                <td style="color:#6c9ebf">${eq.puntosPrediccion}</td>
                <td style="color:#6c9ebf">${eq.puntosAdherencia}</td>
                <td style="color:#c0c0c0">${eq.puntosBonos}</td>
                <td style="color:#ff6b6b">${eq.puntosPenalizaciones}</td>
                <td>${eq.exactos}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      const misPartidos = getPartidosDeSede();
      const faseLabel = p => p.fase === 'grupos' ? `Grupo ${p.grupo}` : p.fase.charAt(0).toUpperCase() + p.fase.slice(1);
      const proximos = misPartidos.filter(p => !resultados[p.id] && p.local !== 'Por definir' && p.visita !== 'Por definir').slice(0, 5);
      document.getElementById('proximosPartidos').innerHTML = proximos.map(p => `
        <div class="partido-item">
          <div class="partido-equipos">
            <span class="equipo-local">${bandera(p.local)} ${p.local}</span>
            <span class="vs">VS</span>
            <span class="equipo-visita">${bandera(p.visita)} ${p.visita}</span>
          </div>
          <div style="font-size:0.7rem; color:#888; text-align:center; margin-top:5px">📅 ${p.fecha}${p.hora ? ' ' + p.hora : ''} · ${faseLabel(p)}</div>
        </div>
      `).join('') || '<div style="text-align:center; padding:20px">✅ ¡Todos los partidos jugados!</div>';

      const ultimos = misPartidos.filter(p => resultados[p.id]).slice(-5).reverse();
      document.getElementById('ultimosResultados').innerHTML = ultimos.map(p => `
        <div class="partido-item">
          <div class="partido-equipos">
            <span class="equipo-local">${bandera(p.local)} ${p.local}</span>
            <span class="vs">${resultados[p.id].local} - ${resultados[p.id].visita}</span>
            <span class="equipo-visita">${bandera(p.visita)} ${p.visita}</span>
          </div>
          <div style="font-size:0.7rem; color:#888; text-align:center; margin-top:5px">📅 ${p.fecha} · ${faseLabel(p)}</div>
        </div>
      `).join('') || '<div style="text-align:center; padding:20px">📋 Sin resultados aún</div>';

      const top = ranking[0] || { nombre: '-', total: 0, exactos: 0 };
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="value">${top.nombre}</div><div>🏆 Líder</div></div>
        <div class="stat-card"><div class="value">${top.total}</div><div>Puntos Totales</div></div>
        <div class="stat-card"><div class="value">${top.exactos}</div><div>🎯 Exactos</div></div>
        <div class="stat-card"><div class="value">${misPartidos.filter(p => resultados[p.id]).length}</div><div>Partidos Jugados</div></div>
      `;
    }

    // ==================== PREDICCIONES ====================
    const FASES_ORDER = { 'grupos':0, '16vos':1, 'octavos':2, 'cuartos':3, 'semifinal':4, 'final':5 };
    const FASES_LABEL = { 'grupos':'Grupo', '16vos':'16vos de Final', 'octavos':'Octavos de Final', 'cuartos':'Cuartos de Final', 'semifinal':'Semifinal', 'final':'🏆 Final' };

    function renderPredicciones() {
      if (!currentUser || currentUser.isAdmin) {
        document.getElementById('prediccionesList').innerHTML = '<div style="text-align:center; padding:20px">🔒 Inicia sesión para hacer tus predicciones</div>';
        return;
      }
      const misPreds = predicciones[currentUser.id] || {};
      const allPartidos = getPartidosDeSede();

      // Agrupar: fase de grupos por grupo, knockout por fase
      const gruposMap = {};
      const knockoutMap = {};
      for (const p of allPartidos) {
        const fase = p.fase || 'grupos';
        if (fase === 'grupos') {
          if (!gruposMap[p.grupo]) gruposMap[p.grupo] = [];
          gruposMap[p.grupo].push(p);
        } else {
          if (p.local === 'Por definir' || p.visita === 'Por definir') continue;
          if (!knockoutMap[fase]) knockoutMap[fase] = [];
          knockoutMap[fase].push(p);
        }
      }

      let html = '';

      // Fase de grupos
      for (const grupo of Object.keys(gruposMap).sort()) {
        html += `<div class="grupo-titulo">🏳️ Grupo ${grupo}</div>`;
        for (const p of gruposMap[grupo]) {
          html += renderPrediccionPartido(p, misPreds);
        }
      }

      // Knockout
      for (const fase of ['16vos','octavos','cuartos','semifinal','final']) {
        if (!knockoutMap[fase] || !knockoutMap[fase].length) continue;
        html += `<div class="grupo-titulo">🏆 ${FASES_LABEL[fase]}</div>`;
        for (const p of knockoutMap[fase]) {
          html += renderPrediccionPartido(p, misPreds);
        }
      }

      document.getElementById('prediccionesList').innerHTML = html;
    }

    function renderPrediccionPartido(p, misPreds) {
      const res = resultados[p.id];
      const pred = misPreds[p.id] || {};
      const bloqueado = p.bloqueado_efectivo === 1;
      const fase = p.fase || 'grupos';
      const etiqueta = fase === 'grupos' ? `Grupo ${p.grupo}` : FASES_LABEL[fase];

      let html = `<div class="partido-item">
        <div class="partido-equipos">
          <span class="equipo-local">${bandera(p.local)} ${p.local}</span>
          <span class="vs">VS</span>
          <span class="equipo-visita">${bandera(p.visita)} ${p.visita}</span>
        </div>
        <div style="font-size:0.7rem; color:#888; text-align:center; margin:5px 0">📅 ${p.fecha}${p.hora ? ' ' + p.hora : ''} · ${etiqueta}</div>`;
      if (bloqueado) {
        const pts = res ? calcularPuntosPrediccion(pred.local, pred.visita, res.local, res.visita) : null;
        html += `<div class="pred-resultado">
          🔒 Tu predicción: ${pred.local !== undefined ? pred.local : '?'} - ${pred.visita !== undefined ? pred.visita : '?'}<br>
          <span style="color: ${pts > 0 ? '#6c9ebf' : '#888'}">${pts !== null ? pts + ' puntos' : ''}</span>
        </div>`;
      } else {
        html += `<div class="pred-inputs">
          <input type="number" id="predL_${p.id}" value="${pred.local !== undefined ? pred.local : ''}" placeholder="0" min="0" max="20" onchange="guardarPrediccion(${p.id})">
          <span>-</span>
          <input type="number" id="predV_${p.id}" value="${pred.visita !== undefined ? pred.visita : ''}" placeholder="0" min="0" max="20" onchange="guardarPrediccion(${p.id})">
          <button class="btn-borrar-pred" onclick="borrarPrediccion(${p.id})" title="Borrar predicción">🗑️</button>
        </div>`;
      }
      html += `</div>`;
      return html;
    }

    async function guardarPrediccion(partidoId) {
      if (!currentUser || currentUser.isAdmin) return;
      const local = document.getElementById(`predL_${partidoId}`).value;
      const visita = document.getElementById(`predV_${partidoId}`).value;
      if (local === '' || visita === '') { mostrarToast('❌ Ingresa ambos marcadores', 'error'); return; }
      const res = await apiCall('POST', '/api/predicciones', { equipoId: currentUser.id, partidoId, local: parseInt(local), visita: parseInt(visita) });
      if (res.error) mostrarToast('❌ ' + res.error, 'error');
      else mostrarToast('✅ Predicción guardada');
    }

    async function borrarPrediccion(partidoId) {
      if (!currentUser || currentUser.isAdmin) return;
      await apiCall('DELETE', `/api/predicciones/${currentUser.id}/${partidoId}`);
      mostrarToast('🗑️ Predicción eliminada');
    }

    async function borrarTodasMisPredicciones() {
      if (!currentUser || currentUser.isAdmin) return;
      if (confirm('⚠️ ¿Estás seguro? Esto borrará TODAS tus predicciones. Esta acción no se puede deshacer.')) {
        await apiCall('DELETE', `/api/predicciones/${currentUser.id}`);
        mostrarToast('🗑️ Todas tus predicciones han sido eliminadas');
      }
    }

    // ==================== ADMIN - EQUIPOS ====================
    function renderAdminEquipos() {
      const filtroSede = document.getElementById('adminEqSedeFilter')?.value || '';
      const eqFiltrados = filtroSede
        ? equipos.filter(e => String(e.sede_id) === filtroSede)
        : equipos;

      document.getElementById('adminEquipos').innerHTML = `
        <div class="card">
          <div class="card-title">👥 Gestión de Equipos</div>
          <div style="margin-bottom:1rem; display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap">
            <label style="font-size:0.85rem">Sede:</label>
            <select id="adminEqSedeFilter" onchange="renderAdminEquipos()" style="padding:4px 8px; background:rgba(13,33,55,0.8); border:1px solid rgba(192,192,192,0.3); border-radius:6px; color:white">
              <option value="">Todas</option>
              ${sedes.map(s => `<option value="${s.id}" ${String(s.id) === filtroSede ? 'selected' : ''}>${s.nombre}</option>`).join('')}
            </select>
          </div>
          ${eqFiltrados.map(eq => {
            const sedeNom = sedes.find(s => s.id === eq.sede_id)?.nombre || '—';
            return `
            <div class="equipo-row">
              <input type="text" id="nombre_${eq.id}" value="${eq.nombre}" style="width:140px">
              <input type="password" id="pin_${eq.id}" value="${eq.pin}" style="width:70px">
              <span style="font-size:0.75rem; color:#888; min-width:80px">${sedeNom}</span>
              <span style="color: ${eq.activo ? '#6c9ebf' : '#ff6b6b'}">${eq.activo ? '✅' : '❌'}</span>
              <button class="btn btn-primary" onclick="guardarEquipo(${eq.id})">💾</button>
              <button class="btn ${eq.activo ? 'btn-danger' : 'btn-success'}" onclick="toggleEquipo(${eq.id})">${eq.activo ? '❌' : '✅'}</button>
            </div>`;
          }).join('')}
          <div style="margin-top:1rem; padding-top:1rem; border-top:1px solid rgba(192,192,192,0.2)">
            <div style="color:#c0c0c0; font-size:0.85rem; margin-bottom:0.5rem">Agregar nuevo equipo</div>
            <div class="equipo-row">
              <input type="text" id="nuevoEqNombre" placeholder="Nombre" style="width:140px">
              <input type="password" id="nuevoEqPin" placeholder="PIN (4 dígitos)" style="width:70px">
              <select id="nuevoEqSede" style="padding:4px 8px; background:rgba(13,33,55,0.8); border:1px solid rgba(192,192,192,0.3); border-radius:6px; color:white">
                ${sedes.filter(s => s.activo).map(s => `<option value="${s.id}">${s.nombre}</option>`).join('')}
              </select>
              <button class="btn btn-primary" onclick="agregarEquipo()">+ Agregar</button>
            </div>
          </div>
        </div>
      `;
    }

    async function guardarEquipo(id) {
      const nombre = document.getElementById(`nombre_${id}`).value;
      const pin = document.getElementById(`pin_${id}`).value;
      await apiCall('PUT', `/api/equipos/${id}`, { nombre, pin });
      mostrarToast('✅ Equipo actualizado');
    }

    async function toggleEquipo(id) {
      await apiCall('PUT', `/api/equipos/${id}/toggle`);
      const eq = equipos.find(e => e.id === id);
      mostrarToast(eq?.activo ? '❌ Equipo desactivado' : '✅ Equipo activado');
    }

    async function agregarEquipo() {
      const nombre = document.getElementById('nuevoEqNombre')?.value?.trim();
      const pin    = document.getElementById('nuevoEqPin')?.value?.trim();
      const sedeId = parseInt(document.getElementById('nuevoEqSede')?.value) || sedes[0]?.id || null;
      if (!nombre || !pin) { mostrarToast('❌ Ingresa nombre y PIN', 'error'); return; }
      await apiCall('POST', '/api/equipos', { nombre, pin, sedeId });
      mostrarToast('➕ Equipo agregado');
    }

    async function agregarEquipoASede(sedeId) {
      const nombre = document.getElementById(`sedeNewEqNombre_${sedeId}`)?.value?.trim();
      const pin    = document.getElementById(`sedeNewEqPin_${sedeId}`)?.value?.trim();
      if (!nombre || !pin) { mostrarToast('❌ Ingresa nombre y PIN', 'error'); return; }
      await apiCall('POST', '/api/equipos', { nombre, pin, sedeId });
      mostrarToast('➕ Equipo agregado a la sede');
    }

    // ==================== ADMIN - RESULTADOS ====================
    function renderAdminResultados() {
      let html = `
        <div class="card">
          <div class="card-title">⚽ Registrar / Editar Resultados Reales</div>
          <div style="margin-bottom: 1rem; display: flex; gap: 0.5rem;">
            <button class="btn btn-danger" onclick="borrarTodosResultados()">🗑️ Reiniciar TODOS los resultados</button>
          </div>
      `;

      // Agrupar partidos
      const gruposMap = {};
      const knockoutMap = {};
      for (const p of partidosData) {
        const fase = p.fase || 'grupos';
        if (fase === 'grupos') {
          if (!gruposMap[p.grupo]) gruposMap[p.grupo] = [];
          gruposMap[p.grupo].push(p);
        } else {
          if (!knockoutMap[fase]) knockoutMap[fase] = [];
          knockoutMap[fase].push(p);
        }
      }

      // Fase de grupos — colapsable
      html += `<details class="admin-section"><summary>⚽ Partidos Fase de Grupos (${Object.values(gruposMap).flat().length} partidos)</summary><div class="admin-section-content">`;
      for (const grupo of Object.keys(gruposMap).sort()) {
        html += `<div class="grupo-titulo">🏳️ Grupo ${grupo}</div>`;
        for (const p of gruposMap[grupo]) html += renderAdminResultadoPartido(p);
      }
      html += `</div></details>`;

      // Knockout — siempre visible
      for (const fase of ['16vos','octavos','cuartos','semifinal','final']) {
        if (!knockoutMap[fase] || !knockoutMap[fase].length) continue;
        html += `<div class="grupo-titulo">🏆 ${FASES_LABEL[fase]}</div>`;
        for (const p of knockoutMap[fase]) html += renderAdminResultadoPartido(p);
      }

      html += `</div>`;
      document.getElementById('adminResultados').innerHTML = html;
    }

    function renderAdminResultadoPartido(p) {
      const res = resultados[p.id] || {};
      const bloqueadoManual = p.bloqueado === 1;
      const bloqueadoEfectivo = p.bloqueado_efectivo === 1;
      const fase = p.fase || 'grupos';
      const etiqueta = fase === 'grupos' ? `Grupo ${p.grupo}` : FASES_LABEL[fase];
      const tbd = p.local === 'Por definir' || p.visita === 'Por definir';
      return `
        <div class="partido-item" ${tbd ? 'style="opacity:0.5"' : ''}>
          <div class="partido-equipos">
            <span class="equipo-local"><strong>${bandera(p.local)} ${p.local}</strong></span>
            <span class="vs">VS</span>
            <span class="equipo-visita"><strong>${bandera(p.visita)} ${p.visita}</strong></span>
          </div>
          ${tbd ? '<div style="font-size:0.7rem;color:#888;text-align:center;margin-top:5px">⏳ Equipos por definir</div>' : `
          <div style="display:flex; justify-content:center; gap:0.5rem; margin-top:0.5rem; flex-wrap:wrap">
            <input type="number" id="resL_${p.id}" class="resultado-input" value="${res.local !== undefined ? res.local : ''}" placeholder="0" min="0" max="20">
            <span>-</span>
            <input type="number" id="resV_${p.id}" class="resultado-input" value="${res.visita !== undefined ? res.visita : ''}" placeholder="0" min="0" max="20">
            <button class="btn btn-primary" onclick="guardarResultado(${p.id})">💾 ${res.local !== undefined ? 'Editar' : 'Guardar'}</button>
            ${res.local !== undefined ? `<button class="btn btn-danger" onclick="borrarResultado(${p.id})">🗑️</button>` : ''}
            <button class="btn ${bloqueadoManual ? 'btn-warning' : 'btn-success'}" onclick="toggleBloqueo(${p.id})">${bloqueadoEfectivo ? '🔒' : '🔓'} ${bloqueadoManual ? 'Desbloquear' : 'Bloquear'}</button>
          </div>`}
          <div style="font-size:0.7rem; color:#888; text-align:center; margin-top:5px">📅 ${p.fecha}${p.hora ? ' ' + p.hora : ''} · ${etiqueta}</div>
        </div>
      `;
    }

    async function guardarResultado(partidoId) {
      const local = document.getElementById(`resL_${partidoId}`).value;
      const visita = document.getElementById(`resV_${partidoId}`).value;
      if (local === '' || visita === '') { mostrarToast('❌ Ingresa ambos marcadores', 'error'); return; }
      await apiCall('POST', '/api/resultados', { partidoId, local: parseInt(local), visita: parseInt(visita) });

    // ==================== FIXTURE / BRACKET ====================
    function renderBracketMatch(p) {
      const res = resultados[p.id];
      const tbd = p.local === 'Por definir' || p.visita === 'Por definir';
      const localWin  = res && res.local > res.visita;
      const visitaWin = res && res.visita > res.local;
      return `<div class="bm ${res ? 'played' : ''} ${tbd ? 'bm-tbd' : ''}">
        <div class="bm-team ${localWin ? 'winner' : ''}">
          <span class="bm-flag">${bandera(p.local)}</span>
          <span class="bm-name">${p.local}</span>
          ${res ? `<span class="bm-score">${res.local}</span>` : ''}
        </div>
        <div class="bm-team ${visitaWin ? 'winner' : ''}">
          <span class="bm-flag">${bandera(p.visita)}</span>
          <span class="bm-name">${p.visita}</span>
          ${res ? `<span class="bm-score">${res.visita}</span>` : ''}
        </div>
      </div>`;
    }

    function renderFixture() {
      const byId = {};
      for (const p of partidosData) byId[p.id] = p;

      const leftR32  = [73,74,75,76,77,78,79,80].map(id => byId[id]).filter(Boolean);
      const rightR32 = [81,82,83,84,85,86,87,88].map(id => byId[id]).filter(Boolean);
      const leftR16  = [89,90,91,92].map(id => byId[id]).filter(Boolean);
      const rightR16 = [93,94,95,96].map(id => byId[id]).filter(Boolean);
      const leftQF   = [97,98].map(id => byId[id]).filter(Boolean);
      const rightQF  = [99,100].map(id => byId[id]).filter(Boolean);
      const leftSF   = byId[101];
      const rightSF  = byId[102];
      const final    = byId[103];

      if (!leftR32.length) {
        document.getElementById('fixtureContent').innerHTML = '<div style="text-align:center;padding:2rem;color:#888">Los partidos de eliminación directa aún no están disponibles</div>';
        return;
      }

      const col = (title, matches) => `
        <div class="bracket-round">
          ${Array.isArray(matches) ? matches.map(m => renderBracketMatch(m)).join('') : (matches ? renderBracketMatch(matches) : '')}
        </div>`;

      document.getElementById('fixtureContent').innerHTML = `
        <div class="bracket-wrapper">
          <div class="bracket">
            ${col('16vos', leftR32)}
            ${col('Octavos', leftR16)}
            ${col('Cuartos', leftQF)}
            ${col('Semi', leftSF ? [leftSF] : [])}
            ${col('🏆 Final', final ? [final] : [])}
            ${col('Semi', rightSF ? [rightSF] : [])}
            ${col('Cuartos', rightQF)}
            ${col('Octavos', rightR16)}
            ${col('16vos', rightR32)}
          </div>
        </div>
      `;
    }

      const pin = document.getElementById('loginPin').value;
      if (!sedeId || !equipoId) { document.getElementById('loginError').style.display = 'block'; return; }
      const res = await apiCall('POST', '/api/auth/equipo', { equipoId, pin });
      if (res.error || !res.equipo) { document.getElementById('loginError').style.display = 'block'; return; }
      document.getElementById('loginError').style.display = 'none';
      const equipo = res.equipo;
      const sedeNombre = sedes.find(s => s.id === (equipo.sede_id || sedeId))?.nombre || '';
      currentUser = { id: equipo.id, nombre: equipo.nombre, isAdmin: false, sedeId: equipo.sede_id || sedeId };
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('userBadge').textContent = `🟢 ${equipo.nombre}${sedeNombre ? ' · ' + sedeNombre : ''}`;
      showPage('dashboard');
      actualizarMobileNav();
    }

    async function doAdminLogin() {
      const pass = document.getElementById('adminPass').value;
      const res = await apiCall('POST', '/api/auth/admin', { password: pass });
      if (res.error) { document.getElementById('adminError').style.display = 'block'; return; }
      document.getElementById('adminError').style.display = 'none';
      currentUser = { id: 0, nombre: 'Admin', isAdmin: true };
      document.getElementById('adminLoginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('userBadge').textContent = '⚙️ Admin';
      document.getElementById('adminBtn').style.display = 'block';
      showPage('dashboard');
      actualizarMobileNav();
    }

    function logout() {
      currentUser = null;
      document.getElementById('app').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginPin').value = '';
      document.getElementById('adminBtn').style.display = 'none';
      // Resetear selección de sede/equipo
      const selSede = document.getElementById('loginSede');
      if (selSede) selSede.value = '';
      const selEq = document.getElementById('loginEquipo');
      if (selEq) selEq.innerHTML = '<option value="">-- Selecciona tu equipo --</option>';
    }

    function showAdminLogin() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminLoginScreen').style.display = 'flex';
    }

    function hideAdminLogin() {
      document.getElementById('adminLoginScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    }

    function actualizarMobileNav() {
      const mobileNav = document.getElementById('mobileNav');
      const pages = ['dashboard', 'predicciones', 'fixture'];
      if (currentUser?.isAdmin) pages.push('admin');
      const icons = { dashboard:'📊', predicciones:'🎯', fixture:'🏆', admin:'⚙️' };
      mobileNav.innerHTML = pages.map(p => `
        <button onclick="showPage('${p}')" class="${currentPage === p ? 'active' : ''}">
          ${icons[p] || '📋'}
          <br><span style="font-size:0.6rem">${p === 'fixture' ? 'Fixture' : p}</span>
        </button>
      `).join('');
    }

    // Los partidos son globales (los mismos 72 para todas las sedes).
    // Solo los equipos en el ranking se filtran por sede.
    function getEquiposDeSede() {
      if (!currentUser || currentUser.isAdmin || !currentUser.sedeId) return equipos;
      return equipos.filter(e => e.sede_id === currentUser.sedeId);
    }
    function getPartidosDeSede() {
      return partidosData; // globales, no se filtran por sede
    }

    function cargarSedesLogin() {
      const selSede = document.getElementById('loginSede');
      if (!selSede) return;
      const val = selSede.value;
      selSede.innerHTML = '<option value="">-- Selecciona tu sede --</option>' +
        sedes.filter(s => s.activo).map(s => `<option value="${s.id}">${s.nombre}</option>`).join('');
      if (val) { selSede.value = val; filtrarEquiposPorSede(); }
    }

    function filtrarEquiposPorSede() {
      const sedeId = parseInt(document.getElementById('loginSede')?.value) || 0;
      const sel = document.getElementById('loginEquipo');
      if (!sel) return;
      sel.innerHTML = '<option value="">-- Selecciona tu equipo --</option>' +
        equipos.filter(e => e.activo && (!sedeId || e.sede_id === sedeId))
               .map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
    }

    function mostrarToast(mensaje, tipo = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${tipo === 'error' ? 'error' : ''}`;
      toast.textContent = mensaje;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ==================== EXPORTAR FUNCIONES GLOBALES ====================
    window.guardarPrediccion = guardarPrediccion;
    window.borrarPrediccion = borrarPrediccion;
    window.borrarTodasMisPredicciones = borrarTodasMisPredicciones;
    window.guardarResultado = guardarResultado;
    window.borrarResultado = borrarResultado;
    window.borrarTodosResultados = borrarTodosResultados;
    window.guardarEquipo = guardarEquipo;
    window.toggleEquipo = toggleEquipo;
    window.agregarEquipo = agregarEquipo;
    window.setAdherencia = setAdherencia;
    window.cargarAdherenciaFecha = cargarAdherenciaFecha;
    window.agregarBono = agregarBono;
    window.eliminarBono = eliminarBono;
    window.toggleBonoPersonalizado = toggleBonoPersonalizado;
    window.agregarPenalizacion = agregarPenalizacion;
    window.eliminarPenalizacion = eliminarPenalizacion;
    window.togglePenPersonalizado = togglePenPersonalizado;
    window.borrarPrediccionesEquipo = borrarPrediccionesEquipo;
    window.adminGuardarPrediccion = adminGuardarPrediccion;
    window.adminBorrarPrediccion = adminBorrarPrediccion;
    window.toggleBloqueo = toggleBloqueo;
    window.guardarSede = guardarSede;
    window.toggleSede = toggleSede;
    window.agregarSede = agregarSede;
    window.agregarEquipoASede = agregarEquipoASede;
    window.filtrarEquiposPorSede = filtrarEquiposPorSede;
    window.renderFixture = renderFixture;
    window.showPage = showPage;
    window.showAdminTab = showAdminTab;
    window.doLogin = doLogin;
    window.doAdminLogin = doAdminLogin;
    window.showAdminLogin = showAdminLogin;
    window.hideAdminLogin = hideAdminLogin;
    window.logout = logout;
  </script>
</body>
</html>
